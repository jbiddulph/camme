services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: camme
      POSTGRES_PASSWORD: camme
      POSTGRES_DB: camme
    ports:
      - "5432:5432"
    volumes:
      - camme_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50100-50200:50100-50200/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

volumes:
  camme_pg_data:
